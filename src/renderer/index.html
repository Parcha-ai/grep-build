<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: monaco-asset:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: monaco-asset:; style-src 'self' 'unsafe-inline' monaco-asset: https://fonts.googleapis.com; connect-src 'self' https://api.anthropic.com https://api.github.com https://api.elevenlabs.io https://*.elevenlabs.io https://api.openai.com wss://*.livekit.cloud wss://*.elevenlabs.io ws://localhost:* wss://localhost:* http://localhost:* https://localhost:* monaco-asset:; img-src 'self' data: https: blob:; font-src 'self' data: monaco-asset: https://fonts.gstatic.com; worker-src 'self' blob: data: monaco-asset:;" />
    <title>Grep</title>
    <!-- Early Monaco error suppression - runs before React loads -->
    <script>
      (function() {
        var monacoErrors = [
          'TextModel got disposed before DiffEditorWidget model got reset',
          'no diff result available',
          'Diff editor requires a model',
          'Cannot read properties of disposed',
          'DISPOSED'
        ];
        function isMonacoError(msg) {
          if (!msg) return false;
          for (var i = 0; i < monacoErrors.length; i++) {
            if (msg.indexOf(monacoErrors[i]) !== -1) return true;
          }
          return false;
        }
        window.onerror = function(message, source, lineno, colno, error) {
          var msg = String(message || (error && error.message) || '');
          if (isMonacoError(msg)) return true;
          return false;
        };
        window.addEventListener('error', function(event) {
          var msg = event.message || (event.error && event.error.message) || '';
          if (isMonacoError(msg)) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
            return false;
          }
        }, true);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body class="bg-claude-bg text-claude-text">
    <div id="root"></div>
  </body>
</html>
